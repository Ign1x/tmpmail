services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: tmpmail-api:local
    container_name: tmpmail-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TMPMAIL_DATABASE_URL: "${TMPMAIL_DATABASE_URL:-}"
      TMPMAIL_ADMIN_STATE_PATH: "${TMPMAIL_ADMIN_STATE_PATH:-data/config/admin-state.json}"
      TMPMAIL_STORE_STATE_PATH: "${TMPMAIL_STORE_STATE_PATH:-data/storage/store-state.json}"
    volumes:
      - ./data:/app/data
    ports:
      - "${TMPMAIL_API_BIND_IP:-127.0.0.1}:${TMPMAIL_PORT:-8080}:${TMPMAIL_PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${TMPMAIL_PORT:-8080}/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_TMPMAIL_BRAND_NAME: "${NEXT_PUBLIC_TMPMAIL_BRAND_NAME:-TmpMail}"
        NEXT_PUBLIC_TMPMAIL_BRAND_DOMAIN: "${NEXT_PUBLIC_TMPMAIL_BRAND_DOMAIN:-}"
        NEXT_PUBLIC_TMPMAIL_REPO_URL: "${NEXT_PUBLIC_TMPMAIL_REPO_URL:-}"
        NEXT_PUBLIC_TMPMAIL_QUICK_CREATE_PASSWORD: "${NEXT_PUBLIC_TMPMAIL_QUICK_CREATE_PASSWORD:-}"
    image: tmpmail-frontend:local
    container_name: tmpmail-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      PORT: 3000
      TMPMAIL_SERVER_API_BASE_URL: "http://api:${TMPMAIL_PORT:-8080}"
      TMPMAIL_ADMIN_ENTRY_PATH: "${TMPMAIL_ADMIN_ENTRY_PATH:-/admin}"
      TMPMAIL_ADMIN_REQUIRE_SECURE_TRANSPORT: "${TMPMAIL_ADMIN_REQUIRE_SECURE_TRANSPORT:-true}"
      NEXT_PUBLIC_TMPMAIL_BRAND_NAME: "${NEXT_PUBLIC_TMPMAIL_BRAND_NAME:-TmpMail}"
      NEXT_PUBLIC_TMPMAIL_BRAND_DOMAIN: "${NEXT_PUBLIC_TMPMAIL_BRAND_DOMAIN:-}"
      NEXT_PUBLIC_TMPMAIL_REPO_URL: "${NEXT_PUBLIC_TMPMAIL_REPO_URL:-}"
      NEXT_PUBLIC_TMPMAIL_QUICK_CREATE_PASSWORD: "${NEXT_PUBLIC_TMPMAIL_QUICK_CREATE_PASSWORD:-}"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${TMPMAIL_FRONTEND_BIND_IP:-0.0.0.0}:${TMPMAIL_FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/en').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    container_name: tmpmail-postgres
    restart: unless-stopped
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: "${TMPMAIL_POSTGRES_DB:-tmpmail}"
      POSTGRES_USER: "${TMPMAIL_POSTGRES_USER:-tmpmail}"
      POSTGRES_PASSWORD: "${TMPMAIL_POSTGRES_PASSWORD:-tmpmail}"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${TMPMAIL_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TMPMAIL_POSTGRES_USER:-tmpmail} -d ${TMPMAIL_POSTGRES_DB:-tmpmail}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
